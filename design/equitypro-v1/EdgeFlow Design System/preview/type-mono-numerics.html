<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:28px 32px; background: hsl(var(--background)); color: hsl(var(--foreground)); }
  .row { display:flex; align-items:flex-end; gap:36px; margin-bottom:18px; }
  .label { font-size:10px; text-transform:uppercase; letter-spacing:.05em; color: hsl(var(--muted-foreground)); margin-bottom:4px; font-weight:500; }
  .num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-weight:600; }
</style></head>
<body>
  <div class="row">
    <div><div class="label">Mono · 30px · price</div><div class="num" style="font-size:30px">₹2,847.50</div></div>
    <div><div class="label">Mono · 18px · indicator</div><div class="num" style="font-size:18px">RSI 14: 62.8</div></div>
    <div><div class="label">Mono · 14px · expression</div><div class="num" style="font-size:14px;color:hsl(var(--primary))">sma_50 &gt; sma_200</div></div>
  </div>
  <div class="row">
    <div><div class="label">Eyebrow uppercase · 12px</div><div style="font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:hsl(var(--muted-foreground))">NIFTY 50 · LARGE CAP</div></div>
    <div><div class="label">Wordmark · Fontastique 32px</div><div style="font-family:var(--font-display);color:hsl(var(--brand-orange));font-size:32px;line-height:1">iphub</div></div>
  </div>
</body></html>
