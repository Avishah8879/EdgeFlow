<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background: hsl(var(--background)); color: hsl(var(--foreground)); font-family: var(--font-sans); }
  .card { background: hsl(var(--card)); border:1px solid hsl(var(--border)); border-radius:12px; padding:16px; display:flex; justify-content:space-between; align-items:center; gap:16px; }
  .left { display:flex; gap:14px; align-items:center; }
  .ticker { font-family: var(--font-mono); font-weight:700; font-size:15px; }
  .name { font-size:12px; color: hsl(var(--muted-foreground)); margin-top:2px; }
  .price { font-family: var(--font-mono); font-weight:700; font-size:18px; text-align:right; }
  .pos { color: hsl(var(--positive)); font-family: var(--font-mono); font-size:13px; font-weight:600; }
  .sector-chip { font-size:10px; padding:2px 8px; border-radius:9999px; background: hsl(var(--muted)); color: hsl(var(--muted-foreground)); text-transform:uppercase; letter-spacing:.04em; font-weight:500; }
</style></head>
<body>
  <div class="card">
    <div class="left">
      <div>
        <div class="ticker">RELIANCE</div>
        <div class="name">Reliance Industries · <span class="sector-chip">Energy</span></div>
      </div>
    </div>
    <div>
      <div class="price">₹2,847.50</div>
      <div class="pos" style="text-align:right">▲ +1.85% · +51.70</div>
    </div>
  </div>
</body></html>
