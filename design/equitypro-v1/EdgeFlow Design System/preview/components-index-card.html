<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background: hsl(var(--background)); color: hsl(var(--foreground)); font-family: var(--font-sans); display:grid; grid-template-columns: repeat(2, 1fr); gap:16px; }
  .gradient-glow-card { background-image: linear-gradient(163deg, hsl(var(--primary)) 0%, hsl(35 100% 50%) 100%); border-radius: 12px; padding:1px; }
  .inner { background: hsl(var(--card)); border-radius:11px; padding:16px; display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
  .eyebrow { font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:.05em; color: hsl(var(--muted-foreground)); }
  .value { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-weight:700; font-size:18px; margin-top:4px; }
  .pos { color: hsl(var(--positive)); font-family: var(--font-mono); font-weight:600; font-size:14px; }
  .neg { color: hsl(var(--negative)); font-family: var(--font-mono); font-weight:600; font-size:14px; }
</style></head>
<body>
  <div class="gradient-glow-card"><div class="inner">
    <div><div class="eyebrow">Nifty 50</div><div class="value">22,041.45</div></div>
    <div style="text-align:right"><div class="pos">▲ +1.24%</div><div style="font-size:11px;color:hsl(var(--muted-foreground));font-family:var(--font-mono)">+270.18</div></div>
  </div></div>
  <div class="gradient-glow-card"><div class="inner">
    <div><div class="eyebrow">Bank Nifty</div><div class="value">48,127.30</div></div>
    <div style="text-align:right"><div class="neg">▼ −0.81%</div><div style="font-size:11px;color:hsl(var(--muted-foreground));font-family:var(--font-mono)">−394.55</div></div>
  </div></div>
</body></html>
