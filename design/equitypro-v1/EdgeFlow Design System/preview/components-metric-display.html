<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background: hsl(var(--background)); color: hsl(var(--foreground)); font-family: var(--font-sans); display:grid; grid-template-columns: repeat(3, 1fr); gap:14px; }
  .card { background: hsl(var(--card)); border:1px solid hsl(var(--border)); border-radius:12px; padding:14px; }
  .label { display:flex; align-items:center; gap:6px; font-size:11px; color:hsl(var(--muted-foreground)); margin-bottom:6px; text-transform:uppercase; letter-spacing:.05em; font-weight:500; }
  .value { font-family:var(--font-mono); font-variant-numeric:tabular-nums; font-weight:700; font-size:22px; }
  .change { font-family:var(--font-mono); font-size:13px; font-weight:600; margin-top:4px; }
  .pos { color: hsl(var(--positive)); }
  .neg { color: hsl(var(--negative)); }
  svg { width:14px; height:14px; }
</style></head>
<body>
  <div class="card">
    <div class="label">Market cap</div>
    <div class="value">₹19.2L Cr</div>
    <div class="change pos">▲ +2.1% YTD</div>
  </div>
  <div class="card">
    <div class="label">P/E ratio</div>
    <div class="value">28.4</div>
    <div class="change" style="color:hsl(var(--muted-foreground))">vs 24.6 sector</div>
  </div>
  <div class="card">
    <div class="label">52W High</div>
    <div class="value">₹3,024.90</div>
    <div class="change neg">−5.8% from peak</div>
  </div>
</body></html>
