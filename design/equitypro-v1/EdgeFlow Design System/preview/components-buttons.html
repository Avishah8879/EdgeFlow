<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background: hsl(var(--background)); color: hsl(var(--foreground)); font-family: var(--font-sans); display:flex; gap:12px; flex-wrap:wrap; align-items:center;}
  .btn { display:inline-flex; align-items:center; gap:6px; padding:8px 14px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; border:1px solid transparent; }
  .primary { background: hsl(var(--primary)); color: hsl(var(--primary-foreground)); }
  .outline { background: transparent; border-color: hsl(var(--border)); color: hsl(var(--foreground)); }
  .ghost { background: transparent; color: hsl(var(--muted-foreground)); }
  .destructive { background: hsl(var(--destructive)); color:#fff; }
  .run { height:36px; padding: 0 18px; border:none; border-radius:8px; color: hsl(var(--primary)); font-weight:700; background: linear-gradient(to right, hsl(35 80% 35%), hsl(35 100% 70%), hsl(35 80% 35%)); position:relative; cursor:pointer; }
  .run > span { position:relative; z-index:1; padding: 0 6px; background: hsl(var(--background)); border-radius:6px; padding: 4px 10px; display:inline-block; }
</style></head>
<body>
  <button class="btn primary">Save result</button>
  <button class="btn outline">Cancel</button>
  <button class="btn ghost">View all</button>
  <button class="btn destructive">Delete</button>
  <button class="run"><span>▶ Run</span></button>
</body></html>
