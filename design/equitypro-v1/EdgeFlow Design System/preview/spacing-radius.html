<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background: hsl(var(--background)); color: hsl(var(--foreground)); font-family: var(--font-sans); }
  .grid { display:grid; grid-template-columns: repeat(5, 1fr); gap:14px; }
  .row { display:flex; flex-direction:column; align-items:flex-start; }
  .box { background: hsl(var(--card)); border:1px solid hsl(var(--border)); width:100%; height:64px; }
  .name { font-size:11px; margin-top:6px; color:hsl(var(--foreground)); font-family:var(--font-mono); }
  h1 { font-size:13px; font-weight:600; letter-spacing:.05em; text-transform:uppercase; color: hsl(var(--muted-foreground)); margin:0 0 14px; }
</style></head>
<body>
  <h1>Radius scale</h1>
  <div class="grid">
    <div class="row"><div class="box" style="border-radius:6px"></div><div class="name">sm · 6px</div></div>
    <div class="row"><div class="box" style="border-radius:8px"></div><div class="name">md · 8px (default)</div></div>
    <div class="row"><div class="box" style="border-radius:12px"></div><div class="name">lg · 12px</div></div>
    <div class="row"><div class="box" style="border-radius:16px"></div><div class="name">xl · 16px</div></div>
    <div class="row"><div class="box" style="border-radius:9999px"></div><div class="name">pill</div></div>
  </div>
</body></html>
