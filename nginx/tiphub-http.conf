# Tiphub Nginx Configuration (HTTP-only for IP-based testing)
# Use this when DNS is not yet configured
# Place at /etc/nginx/sites-available/tiphub.conf

# Connection pooling
upstream node_backend {
    server 127.0.0.1:5000;
    keepalive 32;
}

upstream python_backend {
    server 127.0.0.1:7860;
    keepalive 32;
}

# ─── Map auth error codes to JSON responses ─────────────────────────
map $auth_error_code $auth_401_body {
    default                '{"error":{"code":"AUTH_REQUIRED","message":"Authentication required. Include an API key via X-API-Key header.","docs":"https://tiphub.ai/developers","help":["Get a free API key at https://tiphub.ai/developers","Include it as: X-API-Key: tphb_live_YOUR_KEY","For SSE streams: ?api_key=tphb_live_YOUR_KEY"]}}';
    AUTH_REQUIRED          '{"error":{"code":"AUTH_REQUIRED","message":"Authentication required. Include an API key via X-API-Key header.","docs":"https://tiphub.ai/developers","help":["Get a free API key at https://tiphub.ai/developers","Include it as: X-API-Key: tphb_live_YOUR_KEY","For SSE streams: ?api_key=tphb_live_YOUR_KEY"]}}';
    INVALID_API_KEY        '{"error":{"code":"INVALID_API_KEY","message":"Invalid API key. Check that your key starts with tphb_live_ and is correctly copied.","docs":"https://tiphub.ai/developers"}}';
    API_KEY_REVOKED        '{"error":{"code":"API_KEY_REVOKED","message":"This API key has been revoked. Create a new key at https://tiphub.ai/developers.","docs":"https://tiphub.ai/developers"}}';
    API_KEY_INACTIVE       '{"error":{"code":"API_KEY_INACTIVE","message":"This API key is inactive. Re-activate it or create a new key at https://tiphub.ai/developers.","docs":"https://tiphub.ai/developers"}}';
    API_KEY_EXPIRED        '{"error":{"code":"API_KEY_EXPIRED","message":"This API key has expired. Rotate or create a new key at https://tiphub.ai/developers.","docs":"https://tiphub.ai/developers"}}';
}

map $auth_error_code $auth_403_body {
    default                '{"error":{"code":"FORBIDDEN","message":"Access denied. Check the X-Auth-Error-Code response header for details.","docs":"https://tiphub.ai/developers"}}';
    IP_NOT_ALLOWED         '{"error":{"code":"IP_NOT_ALLOWED","message":"Your IP address is not in the allowed list for this API key. Update allowed IPs at https://tiphub.ai/developers.","docs":"https://tiphub.ai/developers"}}';
    ENDPOINT_NOT_ALLOWED   '{"error":{"code":"ENDPOINT_NOT_ALLOWED","message":"This endpoint is not in the allowed scopes for your API key, or is only accessible via the web application.","docs":"https://tiphub.ai/developers"}}';
    TIER_INSUFFICIENT      '{"error":{"code":"TIER_INSUFFICIENT","message":"This endpoint requires a Premium API key. Upgrade at https://tiphub.ai/developers.","docs":"https://tiphub.ai/developers"}}';
    ORIGIN_NOT_ALLOWED     '{"error":{"code":"ORIGIN_NOT_ALLOWED","message":"The request origin is not in the allowed origins for this API key. Update allowed origins at https://tiphub.ai/developers.","docs":"https://tiphub.ai/developers"}}';
    RATE_LIMIT_EXCEEDED    '{"error":{"code":"RATE_LIMIT_EXCEEDED","message":"Rate limit exceeded. Check Retry-After and X-RateLimit-* response headers for reset time.","docs":"https://tiphub.ai/developers"}}';
}

# HTTP server (no SSL)
server {
    listen 80;
    server_name _;  # Accept any hostname (for IP access)

    # Global settings
    client_max_body_size 50m;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        text/xml
        image/svg+xml
        application/x-font-ttf
        font/opentype;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Health checks (Python backend) - no logging
    location /health/ {
        proxy_pass http://python_backend/health/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        access_log off;
    }

    # WebSocket for admin real-time updates
    location /ws/ {
        proxy_pass http://node_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }

    # Static assets - short cache during deployment, change to 1y later
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://node_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        access_log off;
    }

    # OAuth routes (Google sign-in) with rate limiting
    location /auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://node_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin routes (no /api/ prefix)
    location /admin/ {
        proxy_pass http://node_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Internal API key validation (nginx auth_request subrequest target) ---
    location = /internal/validate-api-key {
        internal;
        proxy_pass http://node_backend/internal/validate-api-key;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-API-Key $http_x_api_key;
        proxy_set_header X-Original-URI $request_uri;
        # Explicitly forward browser identity headers that nginx may not pass
        # through auth_request subrequests by default (needed for Branch 2/3)
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Origin $http_origin;
        proxy_set_header Sec-Fetch-Site $http_sec_fetch_site;
        proxy_set_header Referer $http_referer;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    # --- Auth error handlers (return JSON for auth_request failures) ---
    location @api_unauthorized {
        internal;
        default_type application/json;
        add_header X-Auth-Error-Code $auth_error_code always;
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods $cors_methods always;
        add_header Access-Control-Allow-Headers $cors_headers always;
        return 401 $auth_401_body;
    }

    location @api_forbidden {
        internal;
        default_type application/json;
        add_header X-Auth-Error-Code $auth_error_code always;
        add_header Retry-After $auth_retry_after always;
        add_header X-RateLimit-Limit $ratelimit_limit always;
        add_header X-RateLimit-Remaining $ratelimit_remaining always;
        add_header X-RateLimit-Reset $ratelimit_reset always;
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods $cors_methods always;
        add_header Access-Control-Allow-Headers $cors_headers always;
        return 403 $auth_403_body;
    }

    # --- API Documentation (no auth_request - publicly accessible) ---
    # Both /v1/api/docs and /api/docs passthrough (Swagger UI fetches /api/openapi.json)
    location /v1/api/docs {
        proxy_pass http://python_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /v1/api/redoc {
        proxy_pass http://python_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /v1/api/openapi.json {
        proxy_pass http://python_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /api/docs {
        proxy_pass http://python_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /api/redoc {
        proxy_pass http://python_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location = /api/openapi.json {
        proxy_pass http://python_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # --- Versioned API routes (/v1/api/...) ---
    # Python middleware strips /v1 prefix, so we proxy the full path

    # Versioned Node.js API routes (auth handled by Node.js itself)
    location ~ ^/v1(/api/(?:subscription|auth|notifications|privacy|config|admin|saved|track|developer)/.*)$ {
        proxy_pass http://node_backend$1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Versioned SSE: Expert Screener stream
    location /v1/api/expert-screener/stream/ {
        auth_request /internal/validate-api-key;
        auth_request_set $api_user_id $upstream_http_x_api_user_id;
        auth_request_set $api_key_tier $upstream_http_x_api_key_tier;
        auth_request_set $api_key_id $upstream_http_x_api_key_id;
        auth_request_set $api_key_type $upstream_http_x_api_key_type;
        auth_request_set $cors_origin $upstream_http_access_control_allow_origin;
        auth_request_set $cors_methods $upstream_http_access_control_allow_methods;
        auth_request_set $cors_headers $upstream_http_access_control_allow_headers;
        auth_request_set $ratelimit_limit $upstream_http_x_ratelimit_limit;
        auth_request_set $ratelimit_remaining $upstream_http_x_ratelimit_remaining;
        auth_request_set $ratelimit_reset $upstream_http_x_ratelimit_reset;
        auth_request_set $auth_error_code $upstream_http_x_auth_error_code;
        auth_request_set $auth_retry_after $upstream_http_retry_after;

        error_page 401 = @api_unauthorized;
        error_page 403 = @api_forbidden;

        proxy_pass http://python_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-API-User-Id $api_user_id;
        proxy_set_header X-API-Key-Tier $api_key_tier;
        proxy_set_header X-API-Key-Id $api_key_id;
        proxy_set_header X-API-Key-Type $api_key_type;
        proxy_set_header Connection '';

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods $cors_methods always;
        add_header Access-Control-Allow-Headers $cors_headers always;
        add_header X-RateLimit-Limit $ratelimit_limit always;
        add_header X-RateLimit-Remaining $ratelimit_remaining always;
        add_header X-RateLimit-Reset $ratelimit_reset always;

        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 300s;
    }

